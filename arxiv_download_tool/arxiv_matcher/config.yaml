# ============================================================================
# arXiv title matcher configuration
# ============================================================================

# --- Data ---------------------------------------------------------------
# The arXiv title index TSV: "<arxiv_id>\t<normalized_title>\t<surname>".
corpus_path: "./arxiv_title_index.tsv"

# Where the built index (embeddings + metadata) is written / read from.
index_dir: "./arxiv_index"

# --- Models -------------------------------------------------------------
embedding_model_path: "/yufan/open_source_models/Embedding_Model/Qwen3-Embedding-0.6B"
reranker_model_path: "/yufan/open_source_models/Ranker_Model/Qwen3-Reranker-0.6B"

# Devices. The 0.6B models are small enough to share one GPU.
embedding_device: "cuda:0"
reranker_device: "cuda:0"

# torch dtype for inference. "bfloat16" is recommended on modern GPUs.
dtype: "bfloat16"

# Set to true if flash-attn is installed (faster, less memory).
use_flash_attention: false

# --- Tokenisation -------------------------------------------------------
# Titles are short, so a small max_length keeps indexing fast.
embedding_max_length: 128
reranker_max_length: 256

# --- Retrieval ----------------------------------------------------------
recall_k: 15                 # embedding candidates passed to the reranker

# One-sentence task instructions (English is recommended by Qwen).
query_instruction: "Given a paper title, retrieve the arXiv paper with the same title."
reranker_instruction: "Judge whether the candidate title refers to the same paper as the query title."

# --- Adjudication (final same-paper decision) ---------------------------
# After reranking to top-1, accept the match only when the normalized-title
# edit-distance similarity is at least this, AND the first-author surname agrees.
title_sim_threshold: 0.90
require_author_match: true

# --- Indexing -----------------------------------------------------------
embedding_batch_size: 256    # titles embedded per forward pass

# --- Web UI -------------------------------------------------------------
share: true                  # Gradio share=True -> public URL
server_port: 7860
